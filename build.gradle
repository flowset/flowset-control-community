import com.github.spotbugs.snom.Confidence
import com.github.spotbugs.snom.Effort
import org.springframework.boot.gradle.tasks.buildinfo.BuildInfo

plugins {
    id 'io.jmix' version '2.7.4'
    id 'java'
    id 'org.jetbrains.gradle.plugin.idea-ext' version '1.1.9'
    id 'com.github.spotbugs' version '6.1.7'
    id "org.sonarqube" version "6.3.1.5724"
    id "org.cyclonedx.bom" version "3.0.2"
}

apply plugin: 'org.springframework.boot'
apply plugin: 'com.vaadin'
apply plugin: 'war'

jmix {
    bomVersion = '2.7.3'
}

group = 'io.flowset'
version = project.findProperty("appVersion") ?: '2026.1.999-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
    maven {
        url 'https://global.repo.jmix.io/repository/public'
    }
    maven {
        url 'https://maven.vaadin.com/vaadin-addons'
    }

    if (project.hasProperty('flowsetRepoUrl')) {
        maven {
            url = rootProject['flowsetRepoUrl']
            credentials {
                username rootProject['flowsetRepoUser']
                password rootProject['flowsetRepoPassword']
            }
            allowInsecureProtocol = true
        }
    } else {
        maven {
            url 'https://nexus.flowset.io/repository/public'
        }
    }
}

dependencies {
    // Flowset
    implementation(platform("io.flowset.bom:flowset-bom:$bomVersion"))
    implementation 'io.flowset.ui:flowset-theme'
    implementation 'io.flowset.ui:flowset-ui-kit-starter'

    // Jmix
    implementation 'io.jmix.core:jmix-core-starter'
    implementation 'io.jmix.gridexport:jmix-gridexport-flowui-starter'
    implementation 'io.jmix.data:jmix-eclipselink-starter'
    implementation 'io.jmix.security:jmix-security-starter'
    implementation 'io.jmix.security:jmix-security-flowui-starter'
    implementation 'io.jmix.security:jmix-security-data-starter'
    implementation 'io.jmix.localfs:jmix-localfs-starter'
    implementation 'io.jmix.flowui:jmix-flowui-starter'
    implementation 'io.jmix.flowui:jmix-flowui-data-starter'
    implementation 'io.jmix.flowui:jmix-flowui-themes'
    implementation 'io.jmix.charts:jmix-charts-flowui-starter'
    implementation 'io.jmix.oidc:jmix-oidc-starter'
    implementation 'io.jmix.multitenancy:jmix-multitenancy-starter'
    implementation 'io.jmix.multitenancy:jmix-multitenancy-flowui-starter'

    // Jmix Translations
    implementation 'io.jmix.translations:jmix-translations-de'
    implementation 'io.jmix.translations:jmix-translations-es'
    implementation 'io.jmix.translations:jmix-translations-ru'

    //Vaadin add-ons
    implementation "org.vaadin.addons.componentfactory:spinner"

    // Spring
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation "org.springframework.cloud:spring-cloud-dependencies"
    implementation "org.springframework.cloud:spring-cloud-starter-openfeign"

    // Actuator
    implementation 'org.springframework.boot:spring-boot-starter-actuator'

    // AOP (analytics collection points)
    implementation 'org.springframework.boot:spring-boot-starter-aop'

    // Amplitude (anonymous product analytics)
    implementation 'com.amplitude:java-sdk:1.12.4'
    // org.json is used on the Amplitude Event API surface (Event.eventProperties)
    implementation 'org.json:json:20231013'

    // Camunda
    implementation "org.camunda.community.rest:camunda-platform-7-rest-client-spring-boot"
    implementation "io.holunda.camunda-api:camunda-bpm-engine-api"

    // Camunda util dependencies
    implementation "com.fasterxml.jackson.module:jackson-module-kotlin"

    // Preprocessors
    implementation "org.mapstruct:mapstruct:"
    implementation "org.projectlombok:lombok"

    annotationProcessor platform("io.flowset.bom:flowset-bom:$bomVersion")
    annotationProcessor "org.projectlombok:lombok"
    annotationProcessor "org.mapstruct:mapstruct-processor"

    // Database drivers
    runtimeOnly 'org.hsqldb:hsqldb'
    runtimeOnly 'org.postgresql:postgresql'
    runtimeOnly 'com.mysql:mysql-connector-j'
    runtimeOnly 'com.oracle.database.jdbc:ojdbc11'
    runtimeOnly 'org.mariadb.jdbc:mariadb-java-client'

    runtimeOnly 'org.eclipse.persistence:org.eclipse.persistence.oracle'

    // test: Spring
    testImplementation('org.springframework.boot:spring-boot-starter-test') {
        exclude group: 'org.junit.vintage', module: 'junit-vintage-engine'
    }

    // test: Jmix
    testImplementation 'io.jmix.flowui:jmix-flowui-test-assist'

    // test: processors
    testCompileOnly "org.projectlombok:lombok"
    testAnnotationProcessor platform("io.flowset.bom:flowset-bom:$bomVersion")
    testAnnotationProcessor "org.projectlombok:lombok"

    testImplementation 'org.testcontainers:junit-jupiter'
    testImplementation 'org.testcontainers:postgresql'
    testImplementation 'org.testcontainers:oracle-free'
    testImplementation 'org.testcontainers:mysql'
    testImplementation 'org.testcontainers:mariadb'
    testImplementation 'io.jmix.masquerade:jmix-masquerade'
}

configurations.implementation {
    exclude group: 'com.vaadin', module: 'hilla'
    exclude group: 'com.vaadin', module: 'hilla-dev'
}

test {
    useJUnitPlatform() {
        jvmArgs = ['-Xmx1024m']

        if (project.hasProperty("uiTests")) {
            includeTags("uiTest")
            excludeTags("integrationTest")
        } else if(project.hasProperty("integrationTests")) {
            excludeTags("uiTest")
            includeTags("integrationTest")
        }

        if (project.hasProperty("includeTags")) {
            includeTags(project.property("includeTags").toString())
        }

        if (project.hasProperty("excludeTags")) {
            excludeTags(project.property("excludeTags").toString())
        }
    }
    systemProperties(System.getProperties())
}

idea {
    module {
        excludeDirs.addAll(files '.jmix', 'node_modules', 'src/main/frontend/generated/', 'src/main/bundles')
    }
}

vaadin {
    optimizeBundle = false
}

project.afterEvaluate {
    def bootBuildInfoTask = (BuildInfo) tasks.named('bootBuildInfo').orNull //Jmix plugin adds this task
    if (bootBuildInfoTask != null) {
        bootBuildInfoTask.properties({
            additional = [
                    'buildType'   : project.findProperty('buildType') ?: 'sources',
                    'analyticsKey': project.findProperty('analyticsKey') ?: ''
            ]
        })
    }
}

spotbugs {
    ignoreFailures = false
    omitVisitors = ['FindDoubleCheck']
    excludeFilter = project.file('./etc/spotbugs/spotbugs-exclude-filter.xml')
    effort = Effort.valueOf('MAX')
    reportLevel = Confidence.valueOf('MEDIUM')
}

spotbugsMain {
    jvmArgs = ['-Xmx1024m']

    reports {
        xml.required = false

        html {
            required = true
            stylesheet = 'fancy-hist.xsl'
            destination layout.buildDirectory.file("reports/spotbugs/${project.name}.html").get().asFile
        }
    }

    onlyIf {
        project.hasProperty('spotbugsEnabled')
    }
}

spotbugsTest {
    jvmArgs = ['-Xmx1024m']

    reports {
        xml.required = false
        html {
            required = true
            stylesheet = 'fancy-hist.xsl'
            destination layout.buildDirectory.file("reports/spotbugs/test-${project.name}.html").get().asFile
        }
    }

    onlyIf {
        project.hasProperty('spotbugsEnabled')
    }
}

// ---------------------------------------------------------------------------
// WAR artifact for WildFly deployment
// Build with: ./gradlew -Pvaadin.productionMode=true bootWar
// Output:     build/libs/flowset-control-community.war
// ---------------------------------------------------------------------------
bootWar {
    archiveFileName = "flowset-control-community-${version}.war"

    doLast {
        def warFile = archiveFile.get().asFile
        def tmpFile = new File(warFile.parentFile, warFile.name + ".stripped")
        ant.zip(destfile: tmpFile.absolutePath) {
            zipfileset(src: warFile.absolutePath) {
                exclude(name: "org/springframework/boot/loader/**")

                exclude(name: "META-INF/services/java.nio.file.spi.FileSystemProvider")

                exclude(name: "WEB-INF/lib/tomcat-embed-*.jar")
                exclude(name: "WEB-INF/lib/spring-boot-starter-tomcat-*.jar")
            }
        }
        warFile.delete()
        tmpFile.renameTo(warFile)
        logger.lifecycle("Stripped Spring Boot Loader and embedded Tomcat from WAR (WildFly deployment).")
    }
}

// ---------------------------------------------------------------------------
// EclipseLink Static Weaving  (optional, advanced)
//
// Dynamic weaving is disabled in application-wildfly.properties because JBoss
// Modules' classloader is incompatible with EclipseLink's instrumentation.
// If you need static weaving for full lazy-loading support, do the following:
//
//   1. Create src/main/resources/META-INF/persistence.xml listing your entity
//      packages (required by the EclipseLink weaver CLI tool).
//   2. Uncomment the task below.
//   3. Set eclipselink.weaving=static in application-wildfly.properties.
//   4. Run: ./gradlew -Pvaadin.productionMode=true -PstaticWeave=true bootWar
//
// The task is guarded by the 'staticWeave' Gradle property so it does NOT
// affect normal bootRun / bootJar / Docker builds.
// ---------------------------------------------------------------------------
if (project.hasProperty('staticWeave')) {
    task eclipseLinkStaticWeave(dependsOn: 'compileJava') {
        description = 'Runs EclipseLink static weaving on compiled entity classes.'
        group = 'build'

        doLast {
            ant.taskdef(
                name: 'weave',
                classname: 'org.eclipse.persistence.tools.weaving.jpa.StaticWeaveAntTask',
                classpath: configurations.runtimeClasspath.asPath
            )
            ant.weave(
                source: layout.buildDirectory.dir('classes/java/main').get().asFile.absolutePath,
                target: layout.buildDirectory.dir('classes/java/main').get().asFile.absolutePath,
                persistenceinfo: layout.buildDirectory.dir('classes/java/main').get().asFile.absolutePath,
                loglevel: 'INFO'
            ) {}
        }
    }
    classes.dependsOn eclipseLinkStaticWeave

    logger.lifecycle('EclipseLink static weaving ENABLED (staticWeave property detected).')
}