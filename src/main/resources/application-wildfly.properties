# =============================================================================
# Spring profile: wildfly
#
# Activate when deploying the WAR to WildFly / JBoss EAP:
#   $WILDFLY_HOME/bin/standalone.sh -Dspring.profiles.active=wildfly ...
#
# This profile overrides settings that require adjustment when running inside
# an external servlet container instead of the embedded Tomcat.
# =============================================================================

# --- EclipseLink weaving -----------------------------------------------------
# WildFly uses JBoss Modules — a hierarchical, isolated classloader. EclipseLink
# dynamic weaving relies on instrumentation hooks that are incompatible with this
# classloader model and will fail silently or throw ClassCastExceptions at runtime.
#
# Disabling weaving is the safest and recommended setting for WildFly deployments.
# It trades a small subset of lazy-loading optimisations for guaranteed stability.
#
# If you later need static weaving (pre-processed bytecode), see the
# docs/wildfly-deployment-guide.md — it requires creating a persistence.xml
# and adding the EclipseLink weave Gradle task.
spring.jpa.properties.eclipselink.weaving=false

# --- EclipseLink target-server -----------------------------------------------
# When EclipseLink detects it's running inside a Jakarta EE container (WildFly),
# it auto-detects the target-server and switches to JTA transaction handling.
# Spring Boot uses its own PlatformTransactionManager (not JTA). The mismatch
# causes EclipseLink to fail when looking up the JTA transaction manager from
# JNDI, which in turn crashes any JPA query — including the first role lookup
# in Jmix security (ResourceRoleRepositoryImpl.findRoleByCode).
#
# Setting target-server=None tells EclipseLink to skip JTA integration
# entirely and let Spring manage all transactions.
spring.jpa.properties.eclipselink.target-server=None

# --- EclipseLink JTA / external transaction ----------------------------------
# Belt-and-suspenders: explicitly disable JTA lookup so EclipseLink never
# attempts to enlist in WildFly's UserTransaction.
spring.jpa.properties.eclipselink.transaction.join-existing=false

# --- Atmosphere / Vaadin Push transport --------------------------------------
# Vaadin uses Atmosphere for server-push (@Push on the main class).
# On Undertow the WebSocket transport works best with explicit WEBSOCKET_XHR
# fallback. If push stops working, try changing to LONG_POLLING.
vaadin.push-mode=automatic

# --- Server port -------------------------------------------------------------
# WildFly binds to port 8080 by default; the app will be reachable at that port
# unless WildFly's socket-binding is changed. Override here if needed.
# server.port=8080

# --- JTA — disable Spring Boot JTA auto-configuration -----------------------
# WildFly exposes java:comp/UserTransaction via JNDI. This property prevents
# Spring Boot from activating JTA auto-configuration, ensuring that
# JpaTransactionManager (resource-local) is used for all JPA operations.
spring.jta.enabled=false

# --- Logging — silence known WildFly noise -----------------------------------
# WildFly prints its own deployment INFO lines; reduce duplicate Atmosphere noise.
logging.level.org.atmosphere=warn
logging.level.org.jboss=warn
