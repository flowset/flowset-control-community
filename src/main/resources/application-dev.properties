# 'dev' profile: active only when running the application from sources (see bootRun in build.gradle).
# Production bootJar builds do NOT activate this profile, so these defaults are not applied there.

# Prefilled login credentials for convenience during local development
ui.login.defaultUsername = admin
ui.login.defaultPassword = admin

# Do not send anonymous product analytics when running from sources
flowset.control.analytics.enabled=false