flowset.control.testing.ui.control-url = http://localhost:8081
flowset.control.testing.ui.admin-username = admin
flowset.control.testing.ui.admin-password = admin

# External engine configuration
flowset.control.testing.ui.engine.name = Test Engine
flowset.control.testing.ui.engine.rest-base-url = http://localhost:8088/engine-rest
flowset.control.testing.ui.engine.type = Camunda 7
# flowset.control.testing.ui.engine.type = OPERATON
# flowset.control.testing.ui.engine.auth-type = Basic
# flowset.control.testing.ui.engine.basic-auth-username = admin
# flowset.control.testing.ui.engine.basic-auth-password = admin
# flowset.control.testing.ui.engine.auth-header-name =
# flowset.control.testing.ui.engine.auth-header-value =

# External Control DB
main.datasource.url = jdbc:postgresql://localhost:5432/flowset-control-ui-tests
main.datasource.driver-class-name = org.postgresql.Driver
main.datasource.username = root
main.datasource.password = root

# Do not let Liquibase try to migrate the deployed Control's schema from the test JVM —
# the schema is already at the right version because the deployed Control owns it.
spring.liquibase.enabled=false
